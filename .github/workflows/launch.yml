name: OCI Instance Launcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: oci-launch
  cancel-in-progress: false

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_CLI_USER }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_CLI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_CLI_TENANCY }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_CLI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_CLI_KEY_CONTENT }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Retry every 90 seconds until timeout
        id: launch
        run: |
          success=false
          while true; do
            echo "Attempt at $(date '+%H:%M:%S')"

            result=$(oci compute instance launch \
              --availability-domain "ujzC:AP-MUMBAI-1-AD-1" \
              --compartment-id "${{ secrets.OCI_CLI_TENANCY }}" \
              --shape "VM.Standard.A1.Flex" \
              --shape-config '{"ocpus": 1, "memoryInGBs": 6}' \
              --image-id "ocid1.image.oc1.ap-mumbai-1.aaaaaaaa2op2x2s5rnduo5osx6zojr526qxtrvhddkdhks5nllbwjzcylwya" \
              --subnet-id "ocid1.subnet.oc1.ap-mumbai-1.aaaaaaaa2ajhh2aoxual7q3udqmxe54izgsr4fwp3lsxdazf4icb3p44abdq" \
              --assign-public-ip true \
              --display-name "free-arm-instance" \
              --metadata "{\"ssh_authorized_keys\": \"${{ secrets.OCI_SSH_PUBLIC_KEY }}\"}" \
              2>&1 || true)

            if echo "$result" | grep -q "lifecycle-state"; then
              echo "SUCCESS! Instance Created!"
              echo "$result"
              success=true
              break
            else
              echo "  No capacity, retrying in 90s..."
              sleep 90
            fi
          done
          echo "success=$success" >> "$GITHUB_OUTPUT"

      - name: Notify on success
        if: steps.launch.outputs.success == 'true'
        run: |
          curl -s -d "Instance launched in Mumbai! Check the console and resize it before capacity moves on." \
            -H "Title: OCI Launch Success" -H "Priority: urgent" -H "Tags: tada" \
            https://ntfy.sh/altaf-oci-mumbai-333
